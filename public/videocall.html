<!DOCTYPE html>
<html>
<head>
  <title>Video Call</title>
</head>
<body>

<h2>Video Call</h2>

<video id="localVideo" autoplay muted playsinline style="width:300px;"></video>
<video id="remoteVideo" autoplay playsinline style="width:300px;"></video>

<br/><br/>
<button onclick="startCall()">Start Call</button>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

const params = new URLSearchParams(window.location.search);
const room = params.get("room");
const caller = params.get("caller");
const callee = params.get("callee");

const myId = caller || ("user-" + Math.random());
const targetId = callee;

let pc;
let localStream;

const localVideo = document.getElementById("localVideo");
const remoteVideo = document.getElementById("remoteVideo");


// 🚀 CONNECT
socket.on("connect", async () => {
  console.log("Connected:", socket.id);

  // join hệ thống bạn đang dùng
  socket.emit("user:join", {
    userId: myId,
    conversationId: room
  });

  await initWebRTC();
});


// 🚀 INIT WEBRTC
async function initWebRTC() {
  localStream = await navigator.mediaDevices.getUserMedia({
    video: true,
    audio: true
  });

  localVideo.srcObject = localStream;

  pc = new RTCPeerConnection({
    iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
  });

  localStream.getTracks().forEach(track => {
    pc.addTrack(track, localStream);
  });

  pc.ontrack = (event) => {
    remoteVideo.srcObject = event.streams[0];
  };

  pc.onicecandidate = (event) => {
    if (event.candidate) {
      socket.emit("webrtc:signal", {
        to: targetId,
        signal: {
          type: "ice",
          candidate: event.candidate
        }
      });
    }
  };
}


// 📥 RECEIVE SIGNAL
socket.on("webrtc:signal", async (data) => {
  const { signal } = data;

  if (signal.type === "offer") {
    await pc.setRemoteDescription(new RTCSessionDescription(signal.offer));

    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);

    socket.emit("webrtc:signal", {
      to: targetId,
      signal: {
        type: "answer",
        answer
      }
    });
  }

  if (signal.type === "answer") {
    await pc.setRemoteDescription(new RTCSessionDescription(signal.answer));
  }

  if (signal.type === "ice") {
    await pc.addIceCandidate(new RTCIceCandidate(signal.candidate));
  }
});


// 🚀 START CALL
async function startCall() {
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);

  socket.emit("webrtc:signal", {
    to: targetId,
    signal: {
      type: "offer",
      offer
    }
  });
}
</script>

</body>
</html>
