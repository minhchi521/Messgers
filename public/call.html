<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Video Call - Chat App</title>

    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            color: white;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        .container {
            width: 100vw;
            height: 100vh;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
            padding: 5px;
        }

        .video-box {
            position: relative;
            background: #111;
            border-radius: 10px;
            overflow: hidden;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #localVideo {
            transform: scaleX(-1);
        }

        .label {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.6);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 14px;
        }

        .controls {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 999;
        }

        button {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 24px;
        }

        .end {
            background: red;
            color: white;
        }

        .toggle {
            background: #444;
            color: white;
        }

        .status {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            padding: 10px 18px;
            border-radius: 8px;
            z-index: 999;
        }

        @media(max-width:768px) {
            .container {
                grid-template-columns: 1fr;
            }

            .local-box {
                width: 120px;
                height: 180px;
                position: absolute;
                bottom: 120px;
                right: 10px;
                z-index: 999;
                border: 3px solid white;
            }
        }
    </style>
</head>

<body>

<div class="status" id="status">
    Connecting...
</div>

<div class="container">

    <div class="video-box local-box">
        <video id="localVideo" autoplay muted playsinline></video>
        <div class="label">You</div>
    </div>

    <div class="video-box">
        <video id="remoteVideo" autoplay playsinline></video>
        <div class="label" id="remoteLabel">Remote User</div>
    </div>

</div>

<div class="controls">
    <button class="toggle" id="micBtn">🎤</button>
    <button class="toggle" id="cameraBtn">📹</button>
    <button class="end" id="endBtn">☎️</button>
</div>

<script>

    // ==============================
    // CONFIG
    // ==============================

    const socket = io({
        transports: ['websocket']
    });

    const params = new URLSearchParams(window.location.search);

    const myId =
        params.get('caller') ||
        params.get('callee') ||
        ('user-' + Math.random().toString(36).substring(2, 8));

    const targetId =
        params.get('callee') ||
        params.get('caller');

    const isInitiator = params.get('caller') !== null;

    const ICE_SERVERS = {
        iceServers: [

            // STUN
            {
                urls: 'stun:stun.l.google.com:19302'
            },

            // TURN
            {
                urls: 'turn:openrelay.metered.ca:80',
                username: 'openrelayproject',
                credential: 'openrelayproject'
            },

            {
                urls: 'turn:openrelay.metered.ca:443',
                username: 'openrelayproject',
                credential: 'openrelayproject'
            },

            {
                urls: 'turn:openrelay.metered.ca:443?transport=tcp',
                username: 'openrelayproject',
                credential: 'openrelayproject'
            }
        ]
    };

    // ==============================
    // STATE
    // ==============================

    let pc;
    let localStream;

    let micEnabled = true;
    let cameraEnabled = true;

    const localVideo = document.getElementById('localVideo');
    const remoteVideo = document.getElementById('remoteVideo');

    const statusDiv = document.getElementById('status');

    const micBtn = document.getElementById('micBtn');
    const cameraBtn = document.getElementById('cameraBtn');
    const endBtn = document.getElementById('endBtn');

    // ==============================
    // LOG
    // ==============================

    function log(msg) {
        console.log(msg);
        statusDiv.innerText = msg;
    }

    function error(msg) {
        console.error(msg);
        statusDiv.innerText = msg;
    }

    // ==============================
    // INIT
    // ==============================

    socket.on('connect', async () => {

        log('Socket connected');

        socket.emit('user:join', {
            userId: myId
        });

        await initMedia();
        createPeerConnection();

        if (isInitiator) {

            setTimeout(async () => {
                await createOffer();
            }, 1000);

        } else {
            log('Waiting for offer...');
        }
    });

    // ==============================
    // MEDIA
    // ==============================

    async function initMedia() {

        try {

            localStream = await navigator.mediaDevices.getUserMedia({
                video: true,
                audio: true
            });

            localVideo.srcObject = localStream;

            log('Camera ready');

        } catch (err) {

            error('Camera error: ' + err.message);

        }
    }

    // ==============================
    // PEER
    // ==============================

    function createPeerConnection() {

        pc = new RTCPeerConnection(ICE_SERVERS);

        // add local tracks
        localStream.getTracks().forEach(track => {
            pc.addTrack(track, localStream);
        });

        // remote stream
        pc.ontrack = (event) => {

            console.log('Remote stream received');

            remoteVideo.srcObject = event.streams[0];
        };

        // send ICE
        pc.onicecandidate = (event) => {

            if (event.candidate) {

                socket.emit('webrtc:signal', {
                    to: targetId,
                    signal: {
                        type: 'ice',
                        candidate: event.candidate
                    }
                });
            }
        };

        // connection state
        pc.onconnectionstatechange = () => {

            console.log('Connection state:', pc.connectionState);

            if (pc.connectionState === 'connected') {
                log('✅ Video connected');
            }

            if (pc.connectionState === 'failed') {
                error('❌ Connection failed');
            }
        };

        // ICE state
        pc.oniceconnectionstatechange = () => {

            console.log('ICE state:', pc.iceConnectionState);

            if (pc.iceConnectionState === 'connected') {
                log('✅ ICE connected');
            }

            if (pc.iceConnectionState === 'failed') {
                error('❌ ICE failed');
            }
        };
    }

    // ==============================
    // OFFER
    // ==============================

    async function createOffer() {

        try {

            log('Creating offer...');

            const offer = await pc.createOffer();

            await pc.setLocalDescription(offer);

            socket.emit('webrtc:signal', {
                to: targetId,
                signal: {
                    type: 'offer',
                    offer
                }
            });

            log('Offer sent');

        } catch (err) {

            error('Offer error: ' + err.message);

        }
    }

    // ==============================
    // SIGNALS
    // ==============================

    socket.on('webrtc:signal', async (data) => {

        const { signal } = data;

        try {

            // OFFER
            if (signal.type === 'offer') {

                console.log('Received offer');

                await pc.setRemoteDescription(
                    new RTCSessionDescription(signal.offer)
                );

                const answer = await pc.createAnswer();

                await pc.setLocalDescription(answer);

                socket.emit('webrtc:signal', {
                    to: targetId,
                    signal: {
                        type: 'answer',
                        answer
                    }
                });

                log('Answer sent');
            }

            // ANSWER
            if (signal.type === 'answer') {

                console.log('Received answer');

                await pc.setRemoteDescription(
                    new RTCSessionDescription(signal.answer)
                );

                log('Answer received');
            }

            // ICE
            if (signal.type === 'ice') {

                try {

                    await pc.addIceCandidate(
                        new RTCIceCandidate(signal.candidate)
                    );

                } catch (err) {

                    console.warn('ICE candidate failed', err);

                }
            }

        } catch (err) {

            error('Signal error: ' + err.message);

        }
    });

    // ==============================
    // MIC
    // ==============================

    micBtn.onclick = () => {

        micEnabled = !micEnabled;

        localStream.getAudioTracks().forEach(track => {
            track.enabled = micEnabled;
        });

        micBtn.innerText =
            micEnabled ? '🎤' : '🔇';
    };

    // ==============================
    // CAMERA
    // ==============================

    cameraBtn.onclick = () => {

        cameraEnabled = !cameraEnabled;

        localStream.getVideoTracks().forEach(track => {
            track.enabled = cameraEnabled;
        });

        cameraBtn.innerText =
            cameraEnabled ? '📹' : '⛔';
    };

    // ==============================
    // END CALL
    // ==============================

    endBtn.onclick = () => {

        cleanup();

        window.close();
    };

    // ==============================
    // CLEANUP
    // ==============================

    function cleanup() {

        if (pc) {
            pc.close();
            pc = null;
        }

        if (localStream) {

            localStream.getTracks().forEach(track => {
                track.stop();
            });

            localStream = null;
        }
    }

    window.addEventListener('beforeunload', cleanup);

</script>

</body>
</html>
