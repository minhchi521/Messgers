<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Call - Chat App</title>
    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .call-container {
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
            padding: 5px;
            background: #000;
        }

        @media (max-width: 768px) {
            .call-container {
                grid-template-columns: 1fr;
                grid-template-rows: 1fr 120px;
            }

            .remote {
                grid-row: 1;
                grid-column: 1;
            }

            .local {
                grid-row: 1;
                grid-column: 1;
                width: 120px;
                height: 120px;
                position: absolute;
                bottom: 130px;
                right: 10px;
                border-radius: 12px;
                border: 3px solid white;
                z-index: 20;
            }
        }

        .video-box {
            background: #111;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .local video {
            transform: scaleX(-1);
        }

        .label {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            z-index: 10;
        }

        .status {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            z-index: 10;
        }

        .duration {
            position: absolute;
            bottom: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: bold;
            z-index: 10;
        }

        .controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 25px;
            border-radius: 50px;
        }

        .control-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            font-size: 22px;
            cursor: pointer;
            background: #667eea;
            color: white;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .control-btn:hover {
            background: #5568d3;
            transform: scale(1.1);
        }

        .control-btn.off {
            background: #ff6b6b;
        }

        .control-btn.end-call {
            background: #ff6b6b;
            width: 60px;
            height: 60px;
            font-size: 28px;
        }

        .control-btn.end-call:hover {
            background: #ff5252;
        }

        .call-info {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            text-align: center;
            z-index: 20;
        }

        .call-status-text {
            font-size: 14px;
            margin-bottom: 5px;
        }

        .call-duration-text {
            font-size: 18px;
            font-weight: bold;
            color: #10b981;
        }

        .error-msg {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #ff6b6b;
            color: white;
            padding: 15px 20px;
            border-radius: 8px;
            max-width: 300px;
            z-index: 100;
        }

        @media (max-width: 768px) {
            .call-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="call-container">
        <div class="video-box local">
            <video id="localVideo" autoplay muted playsinline></video>
            <div class="label">You</div>
        </div>

        <div class="video-box remote">
            <video id="remoteVideo" autoplay playsinline></video>
            <div class="label" id="remoteLabel">Waiting for remote...</div>
            <div class="duration" id="duration" style="display: none;">00:00</div>
        </div>

        <div class="status" id="status">Initializing...</div>
    </div>

    <div class="call-info" id="callInfo">
        <div class="call-status-text" id="callStatusText">Connecting...</div>
        <div class="call-duration-text" id="callDurationText">00:00</div>
    </div>

    <div class="controls">
        <button class="control-btn" id="audioBtn" title="Mute/Unmute">🎤</button>
        <button class="control-btn" id="videoBtn" title="Camera On/Off">📹</button>
        <button class="control-btn end-call" id="endBtn" title="End Call">☎️</button>
    </div>

    <div class="error-msg" id="errorMsg" style="display: none;"></div>

    <script>
        // ============ CONFIG ============
        const ICE_SERVERS = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun2.l.google.com:19302' }
            ]
        };

        // ============ STATE ============
        const socket = io();
        const params = new URLSearchParams(window.location.search);
        
        const myId = params.get('caller') || params.get('callee') || ('user-' + Math.random());
        const targetId = params.get('callee') || params.get('caller');
        const isInitiator = params.get('caller') !== null;

        let pc = null;
        let localStream = null;
        let audioEnabled = true;
        let videoEnabled = true;
        let callStartTime = null;
        let connectionState = 'waiting';

        const localVideo = document.getElementById('localVideo');
        const remoteVideo = document.getElementById('remoteVideo');
        const audioBtn = document.getElementById('audioBtn');
        const videoBtn = document.getElementById('videoBtn');
        const endBtn = document.getElementById('endBtn');
        const errorMsg = document.getElementById('errorMsg');
        const callStatusText = document.getElementById('callStatusText');
        const callDurationText = document.getElementById('callDurationText');
        const status = document.getElementById('status');
        const remoteLabel = document.getElementById('remoteLabel');

        // ============ UTILS ============
        function log(msg) {
            console.log('[CALL]', msg);
            callStatusText.textContent = msg;
        }

        function error(msg) {
            console.error('[ERROR]', msg);
            errorMsg.textContent = msg;
            errorMsg.style.display = 'block';
            callStatusText.textContent = 'Error: ' + msg;
            setTimeout(() => errorMsg.style.display = 'none', 5000);
        }

        // ============ INIT ============
        async function init() {
            try {
                log('Getting camera & microphone...');
                
                // Detect mobile device
                const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
                
                // Optimize constraints for bandwidth
                const constraints = {
                    audio: {
                        echoCancellation: true,
                        noiseSuppression: true,
                        autoGainControl: true
                    },
                    video: isMobile ? 
                        {
                            facingMode: 'user',
                            width: { ideal: 320, min: 240 },
                            height: { ideal: 240, min: 180 }
                        } :
                        {
                            width: { ideal: 640, min: 480 },
                            height: { ideal: 480, min: 360 }
                        }
                };
                
                try {
                    localStream = await navigator.mediaDevices.getUserMedia(constraints);
                } catch (err) {
                    // Fallback to basic constraints if specific ones fail
                    log('Retrying with basic constraints...');
                    localStream = await navigator.mediaDevices.getUserMedia({
                        audio: true,
                        video: { facingMode: 'user', width: { max: 240 }, height: { max: 180 } }
                    });
                }

                localVideo.srcObject = localStream;
                log('Camera ready');

                // Create peer connection
                createPeerConnection();

                // If initiator, start the call
                if (isInitiator) {
                    setTimeout(() => {
                        log('Sending offer...');
                        createAndSendOffer();
                    }, 1000);
                } else {
                    log('Waiting for offer...');
                }
            } catch (err) {
                error('Failed to access camera: ' + err.message);
                
                // If it's HTTPS/permission error, show helpful message
                if (err.name === 'NotAllowedError') {
                    error('⚠️ Camera/Mic permission denied. Please allow access in browser settings.');
                } else if (err.name === 'NotFoundError') {
                    error('⚠️ Camera/Microphone not found.');
                } else if (err.name === 'NotSupportedError' || window.location.protocol !== 'https:') {
                    error('⚠️ HTTPS is required for mobile. Please use HTTPS or request desktop browser.');
                }
            }
        }

        function createPeerConnection() {
            pc = new RTCPeerConnection(ICE_SERVERS);

            // Add local tracks with bandwidth optimization
            localStream.getTracks().forEach(track => {
                const sender = pc.addTrack(track, localStream);
                
                // Set bandwidth limits for mobile optimization
                if (track.kind === 'video') {
                    const params = sender.getParameters();
                    if (!params.encodings) {
                        params.encodings = [{}];
                    }
                    params.encodings[0].maxBitrate = 500000; // 500 kbps for video
                    params.encodings[0].maxFramerate = 24;
                    sender.setParameters(params).catch(err => console.log('Failed to set video bitrate:', err));
                } else if (track.kind === 'audio') {
                    const params = sender.getParameters();
                    if (!params.encodings) {
                        params.encodings = [{}];
                    }
                    params.encodings[0].maxBitrate = 50000; // 50 kbps for audio
                    sender.setParameters(params).catch(err => console.log('Failed to set audio bitrate:', err));
                }
            });

            // Handle remote track
            pc.ontrack = (event) => {
                console.log('Remote track received:', event.track.kind);
                remoteVideo.srcObject = event.streams[0];
                remoteLabel.textContent = targetId.substr(0, 12);
            };

            // Handle ICE candidates
            pc.onicecandidate = (event) => {
                if (event.candidate) {
                    console.log('Sending ICE candidate');
                    socket.emit('webrtc:signal', {
                        to: targetId,
                        signal: {
                            type: 'ice',
                            candidate: event.candidate
                        }
                    });
                }
            };

            // Monitor connection state
            pc.onconnectionstatechange = () => {
                connectionState = pc.connectionState;
                console.log('Connection state:', pc.connectionState);
                status.textContent = 'Connection: ' + pc.connectionState;

                if (pc.connectionState === 'connected') {
                    log('Video connected!');
                    callStartTime = Date.now();
                    startDurationTimer();
                    document.getElementById('duration').style.display = 'block';
                    // Monitor bandwidth after connection
                    monitorBandwidth();
                }
            };

            pc.oniceconnectionstatechange = () => {
                console.log('ICE connection state:', pc.iceConnectionState);
            };

            console.log('Peer connection created');
        }

        async function createAndSendOffer() {
            try {
                const offer = await pc.createOffer({
                    offerToReceiveAudio: true,
                    offerToReceiveVideo: true
                });

                await pc.setLocalDescription(offer);
                console.log('Offer created');

                socket.emit('webrtc:signal', {
                    to: targetId,
                    signal: {
                        type: 'offer',
                        offer: offer
                    }
                });

                log('Offer sent, waiting for answer...');
            } catch (err) {
                error('Failed to create offer: ' + err.message);
            }
        }

        // ============ SOCKET EVENTS ============
        socket.on('connect', () => {
            console.log('Connected to server');
            init();
        });

        socket.on('webrtc:signal', async (data) => {
            const { signal } = data;

            try {
                if (signal.type === 'offer') {
                    console.log('Received offer');
                    
                    if (!pc) createPeerConnection();
                    
                    await pc.setRemoteDescription(new RTCSessionDescription(signal.offer));
                    
                    const answer = await pc.createAnswer();
                    await pc.setLocalDescription(answer);

                    socket.emit('webrtc:signal', {
                        to: targetId,
                        signal: {
                            type: 'answer',
                            answer: answer
                        }
                    });

                    log('Answer sent');
                }

                if (signal.type === 'answer') {
                    console.log('Received answer');
                    await pc.setRemoteDescription(new RTCSessionDescription(signal.answer));
                    log('Answer set');
                }

                if (signal.type === 'ice') {
                    console.log('Received ICE candidate');
                    try {
                        await pc.addIceCandidate(new RTCIceCandidate(signal.candidate));
                    } catch (err) {
                        console.warn('Failed to add ICE candidate:', err);
                    }
                }
            } catch (err) {
                error('Signal error: ' + err.message);
            }
        });

        socket.on('webrtc:error', (data) => {
            error(data.message);
        });

        socket.on('disconnect', () => {
            log('Disconnected from server');
        });

        // ============ CONTROLS ============
        audioBtn.addEventListener('click', () => {
            audioEnabled = !audioEnabled;
            localStream.getAudioTracks().forEach(track => {
                track.enabled = audioEnabled;
            });
            audioBtn.classList.toggle('off', !audioEnabled);
            audioBtn.textContent = audioEnabled ? '🎤' : '🔇';
            console.log('Audio:', audioEnabled ? 'ON' : 'OFF');
        });

        videoBtn.addEventListener('click', () => {
            videoEnabled = !videoEnabled;
            localStream.getVideoTracks().forEach(track => {
                track.enabled = videoEnabled;
            });
            videoBtn.classList.toggle('off', !videoEnabled);
            videoBtn.textContent = videoEnabled ? '📹' : '⛔';
            console.log('Video:', videoEnabled ? 'ON' : 'OFF');
        });

        endBtn.addEventListener('click', () => {
            log('Ending call...');
            cleanup();
            setTimeout(() => window.close(), 1000);
        });

        function startDurationTimer() {
            setInterval(() => {
                if (callStartTime && connectionState === 'connected') {
                    const duration = Math.floor((Date.now() - callStartTime) / 1000);
                    const mins = Math.floor(duration / 60);
                    const secs = duration % 60;
                    const formatted = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
                    callDurationText.textContent = formatted;
                    document.getElementById('duration').textContent = formatted;
                }
            }, 1000);
        }

        // ============ BANDWIDTH MONITORING ============
        function monitorBandwidth() {
            let lastBytesSent = 0;
            let lastBytesReceived = 0;
            let lastTime = Date.now();

            setInterval(async () => {
                if (!pc || pc.connectionState !== 'connected') return;

                try {
                    const stats = await pc.getStats();
                    let inboundBitrate = 0;
                    let outboundBitrate = 0;

                    stats.forEach(report => {
                        if (report.type === 'inbound-rtp' && report.kind === 'video') {
                            const bytes = report.bytesReceived;
                            const now = Date.now();
                            const timeDiff = (now - lastTime) / 1000;
                            if (lastBytesReceived > 0) {
                                inboundBitrate = ((bytes - lastBytesReceived) * 8) / timeDiff / 1000; // kbps
                            }
                            lastBytesReceived = bytes;
                        }
                        if (report.type === 'outbound-rtp' && report.kind === 'video') {
                            const bytes = report.bytesSent;
                            const now = Date.now();
                            const timeDiff = (now - lastTime) / 1000;
                            if (lastBytesSent > 0) {
                                outboundBitrate = ((bytes - lastBytesSent) * 8) / timeDiff / 1000; // kbps
                            }
                            lastBytesSent = bytes;
                        }
                    });

                    lastTime = Date.now();

                    // Log bandwidth info
                    console.log(`📊 Bandwidth - Down: ${inboundBitrate.toFixed(0)} kbps, Up: ${outboundBitrate.toFixed(0)} kbps`);
                } catch (err) {
                    console.error('Error monitoring bandwidth:', err);
                }
            }, 2000);
        }

        function cleanup() {
            if (pc) {
                pc.close();
                pc = null;
            }
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }
        }

        window.addEventListener('beforeunload', cleanup);

        // Log state
        console.log('Call Config:', {
            myId,
            targetId,
            isInitiator,
            params: Object.fromEntries(params)
        });
    </script>
</body>
</html>
