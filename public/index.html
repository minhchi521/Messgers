<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat App - Voice Integration</title>
    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            height: 600px;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px 15px 0 0;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .status {
            font-size: 12px;
            opacity: 0.9;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f5f5f5;
        }

        .message {
            margin-bottom: 15px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.own {
            text-align: right;
        }

        .message-content {
            display: inline-block;
            padding: 10px 15px;
            border-radius: 15px;
            max-width: 70%;
            word-wrap: break-word;
        }

        .message.other .message-content {
            background: #ddd;
            color: #333;
            border-bottom-left-radius: 0;
        }

        .message.own .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 0;
        }

        .voice-message {
            background: #e8f0ff;
            padding: 10px 15px;
            border-radius: 15px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .message.own .voice-message {
            background: rgba(255, 255, 255, 0.2);
        }

        .typing {
            color: #999;
            font-size: 12px;
            font-style: italic;
            padding: 10px;
        }

        .input-area {
            padding: 15px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
            flex: 1;
        }

        input[type="text"] {
            flex: 1;
            padding: 10px 15px;
            border: 2px solid #ddd;
            border-radius: 20px;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: #667eea;
        }

        button {
            padding: 10px 20px;
            border: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 20px;
            cursor: pointer;
            transition: opacity 0.3s;
            font-weight: bold;
        }

        button:hover {
            opacity: 0.9;
        }

        button:active {
            opacity: 0.8;
        }

        .voice-btn {
            padding: 10px 15px;
            background: #ff6b6b;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .voice-btn.recording {
            animation: pulse 0.5s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.7;
            }
        }

        .user-info {
            background: #f9f9f9;
            padding: 10px 15px;
            border-top: 1px solid #eee;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💬 Chat Application</h1>
            <div class="status">
                <span id="status">Connecting...</span>
            </div>
        </div>

        <div class="messages" id="messages"></div>

        <div class="typing" id="typing"></div>

        <div class="input-area">
            <div class="input-wrapper">
                <input 
                    type="text" 
                    id="messageInput" 
                    placeholder="Type a message..."
                    autocomplete="off"
                />
                <button id="sendBtn" onclick="sendMessage()">Send</button>
                <button id="voiceBtn" class="voice-btn" onclick="toggleVoiceRecording()" title="Send voice message">
                    🎤
                </button>
            </div>
        </div>

        <div class="user-info">
            <div>User ID: <span id="userId">loading...</span></div>
            <div>Conversation ID: <span id="conversationId">loading...</span></div>
        </div>
    </div>

    <script>
        let socket = io();
        let isRecording = false;
        let mediaRecorder;
        let audioChunks = [];

        const userId = 'user-' + Math.random().toString(36).substr(2, 9);
        const conversationId = 'conv-' + Math.random().toString(36).substr(2, 9);

        document.getElementById('userId').textContent = userId;
        document.getElementById('conversationId').textContent = conversationId;

        // Socket events
        socket.on('connect', () => {
            console.log('Connected to server');
            document.getElementById('status').textContent = 'Connected ✓';
            socket.emit('user:join', { userId, conversationId });
        });

        socket.on('user:joined', (data) => {
            console.log('Joined conversation:', data);
            addSystemMessage('You joined the conversation');
        });

        socket.on('message:received', (data) => {
            displayMessage(data.message, data.message.senderId === userId);
        });

        socket.on('message:voice:received', (data) => {
            displayVoiceMessage(data.message, data.message.senderId === userId);
        });

        socket.on('user:typing', (data) => {
            if (data.userId !== userId) {
                document.getElementById('typing').textContent = 'Someone is typing...';
            }
        });

        socket.on('user:stop-typing', () => {
            document.getElementById('typing').textContent = '';
        });

        socket.on('user:online', (data) => {
            addSystemMessage(`User ${data.userId} is online`);
        });

        socket.on('user:offline', (data) => {
            addSystemMessage(`User ${data.userId} went offline`);
        });

        socket.on('error', (data) => {
            console.error('Error:', data.message);
            alert('Error: ' + data.message);
        });

        socket.on('disconnect', () => {
            document.getElementById('status').textContent = 'Disconnected';
        });

        // Message functions
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();

            if (!message) return;

            socket.emit('message:send', {
                senderId: userId,
                content: message,
                conversationId: conversationId
            });

            displayMessage({ 
                content: message, 
                type: 'text',
                senderId: userId,
                createdAt: new Date()
            }, true);

            input.value = '';
            socket.emit('user:stop-typing', { userId, conversationId });
        }

        function displayMessage(message, isOwn) {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isOwn ? 'own' : 'other'}`;

            const time = new Date(message.createdAt).toLocaleTimeString();

            messageDiv.innerHTML = `
                <div class="message-content">
                    ${escapeHtml(message.content)}
                    <div style="font-size: 11px; opacity: 0.7; margin-top: 5px;">${time}</div>
                </div>
            `;

            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function displayVoiceMessage(message, isOwn) {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isOwn ? 'own' : 'other'}`;

            const time = new Date(message.createdAt).toLocaleTimeString();

            messageDiv.innerHTML = `
                <div class="voice-message">
                    <audio controls style="max-width: 200px;">
                        <source src="${message.audioUrl}" type="audio/mp3">
                    </audio>
                    <small>${message.duration}s</small>
                </div>
                <div style="font-size: 11px; opacity: 0.7; margin-top: 5px;">${time}</div>
            `;

            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function addSystemMessage(text) {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.style.cssText = 'text-align: center; color: #999; font-size: 12px; margin: 10px 0;';
            messageDiv.textContent = text;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function escapeHtml(unsafe) {
            return unsafe
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // Voice recording
        async function toggleVoiceRecording() {
            if (!isRecording) {
                startVoiceRecording();
            } else {
                stopVoiceRecording();
            }
        }

        async function startVoiceRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = (event) => {
                    audioChunks.push(event.data);
                };

                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/mp3' });
                    const audioUrl = URL.createObjectURL(audioBlob);
                    
                    // In production, upload to server
                    const duration = Math.round(mediaRecorder.stream.getTracks()[0].readyState);
                    
                    socket.emit('message:voice:send', {
                        senderId: userId,
                        audioUrl: audioUrl,
                        duration: Math.round(audioChunks.length / 10) || 5,
                        conversationId: conversationId
                    });
                };

                mediaRecorder.start();
                isRecording = true;
                document.getElementById('voiceBtn').classList.add('recording');
                document.getElementById('voiceBtn').textContent = '⏹️';
            } catch (error) {
                console.error('Error accessing microphone:', error);
                alert('Cannot access microphone');
            }
        }

        function stopVoiceRecording() {
            mediaRecorder.stop();
            isRecording = false;
            document.getElementById('voiceBtn').classList.remove('recording');
            document.getElementById('voiceBtn').textContent = '🎤';
        }

        // Input events
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        document.getElementById('messageInput').addEventListener('input', () => {
            socket.emit('user:typing', { userId, conversationId });
        });
    </script>
</body>
</html>
