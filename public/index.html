<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat App - Multi-User</title>
    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 20px;
            height: 600px;
        }

        /* SIDEBAR - Danh sách người dùng */
        .sidebar {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
            font-weight: bold;
        }

        .members-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .member-item {
            padding: 12px;
            margin: 5px 0;
            background: #f5f5f5;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .member-item:hover {
            background: #e8e8e8;
            transform: translateX(5px);
        }

        .member-item.active {
            background: #667eea;
            color: white;
        }

        .member-status {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #10b981;
        }

        .member-status.offline {
            background: #d1d5db;
        }

        .member-name {
            flex: 1;
            font-weight: 500;
        }

        /* CHAT AREA */
        .chat-area {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-info {
            flex: 1;
        }

        .header-info h1 {
            font-size: 20px;
            margin-bottom: 5px;
        }

        .header-info .room-info {
            font-size: 12px;
            opacity: 0.9;
        }

        .header-controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .header-btn {
            padding: 10px 16px;
            border: none;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        .header-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        .header-btn:active {
            transform: scale(0.95);
        }

        .header-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .header-btn.calling {
            animation: pulse-call 1s infinite;
            background: rgba(255, 107, 107, 0.5);
        }

        @keyframes pulse-call {
            0%, 100% {
                background: rgba(255, 107, 107, 0.5);
            }
            50% {
                background: rgba(255, 107, 107, 0.8);
            }
        }

        .status-badge {
            background: rgba(255, 255, 255, 0.2);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f5f5f5;
        }

        .message {
            margin-bottom: 15px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.own {
            text-align: right;
        }

        .message-sender {
            font-size: 11px;
            color: #666;
            margin-bottom: 3px;
            font-weight: 600;
        }

        .message-content {
            display: inline-block;
            padding: 10px 15px;
            border-radius: 15px;
            max-width: 70%;
            word-wrap: break-word;
        }

        .message.other .message-content {
            background: #ddd;
            color: #333;
            border-bottom-left-radius: 0;
        }

        .message.own .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 0;
        }

        .message-time {
            font-size: 11px;
            opacity: 0.7;
            margin-top: 5px;
        }

        .typing {
            color: #999;
            font-size: 12px;
            font-style: italic;
            padding: 10px;
            min-height: 20px;
        }

        .input-area {
            padding: 15px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
            flex: 1;
        }

        input[type="text"] {
            flex: 1;
            padding: 10px 15px;
            border: 2px solid #ddd;
            border-radius: 20px;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: #667eea;
        }

        button {
            padding: 10px 20px;
            border: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 20px;
            cursor: pointer;
            transition: opacity 0.3s;
            font-weight: bold;
        }

        button:hover {
            opacity: 0.9;
        }

        .voice-btn {
            padding: 10px 15px;
            background: #ff6b6b;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .voice-btn.recording {
            animation: pulse 0.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .system-message {
            text-align: center;
            color: #999;
            font-size: 12px;
            margin: 10px 0;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 8px;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
            .sidebar {
                max-height: 150px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- SIDEBAR -->
        <div class="sidebar">
            <div class="sidebar-header">
                👥 Members (<span id="memberCount">0</span>)
            </div>
            <div class="members-list" id="membersList"></div>
        </div>

        <!-- CHAT AREA -->
        <div class="chat-area">
            <div class="header">
                <div class="header-info">
                    <h1 id="roomName">Group Chat</h1>
                    <div class="room-info">
                        <span id="roomInfo">Loading...</span>
                    </div>
                </div>
                <div class="header-controls">
                    <button id="videoCallBtn" class="header-btn" title="Start Video Call" onclick="startVideoCall()">
                        📞
                    </button>
                    <div class="status-badge">
                        <span id="status">Connecting...</span>
                    </div>
                </div>
            </div>

            <div class="messages" id="messages"></div>

            <div class="typing" id="typing"></div>

            <div class="input-area">
                <div class="input-wrapper">
                    <input 
                        type="text" 
                        id="messageInput" 
                        placeholder="Type a message..."
                        autocomplete="off"
                    />
                    <button id="sendBtn" onclick="sendMessage()">Send</button>
                    <button id="voiceBtn" class="voice-btn" onclick="toggleVoiceRecording()" title="Send voice message">
                        🎤
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let socket = io();
        let isRecording = false;
        let mediaRecorder;
        let audioChunks = [];

        const userId = 'user-' + Math.random().toString(36).substr(2, 9);
        const conversationId = 'conv-shared-room'; // Tất cả cùng room
        
        let roomMembers = [];
        let typingUsers = new Set();

        // ===== CONNECT =====
        socket.on('connect', () => {
            console.log('✅ Connected');
            document.getElementById('status').textContent = 'Connected ✓';
            
            socket.emit('user:join', { userId, conversationId });
        });

        // ===== USER JOINED =====
        socket.on('user:joined', (data) => {
            console.log('👤 User joined:', data.userId);
            addSystemMessage(`${data.userId} joined (${data.totalMembers} members)`);
            updateMembersList();
        });

        // ===== RECEIVE MESSAGE =====
        socket.on('message:received', (data) => {
            const { message } = data;
            displayMessage(message, message.senderId === userId);
        });

        // ===== RECEIVE VOICE =====
        socket.on('message:voice:received', (data) => {
            const { message } = data;
            displayVoiceMessage(message, message.senderId === userId);
        });

        // ===== USER TYPING =====
        socket.on('user:typing', (data) => {
            if (data.userId !== userId && !typingUsers.has(data.userId)) {
                typingUsers.add(data.userId);
                updateTypingStatus();
            }
        });

        socket.on('user:stop-typing', (data) => {
            typingUsers.delete(data.userId);
            updateTypingStatus();
        });

        // ===== USER ONLINE/OFFLINE =====
        socket.on('user:offline', (data) => {
            console.log('❌ User offline:', data.userId);
            addSystemMessage(`${data.userId} went offline (${data.memberCount} members)`);
            updateMembersList();
        });

        socket.on('disconnect', () => {
            document.getElementById('status').textContent = 'Disconnected';
        });

        // ===== FUNCTIONS =====
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();

            if (!message) return;

            socket.emit('message:send', {
                senderId: userId,
                content: message,
                conversationId: conversationId
            });

            input.value = '';
            socket.emit('user:stop-typing', { userId, conversationId });
        }

        function displayMessage(message, isOwn) {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isOwn ? 'own' : 'other'}`;

            const time = new Date(message.createdAt).toLocaleTimeString();
            const senderDisplay = isOwn ? 'You' : message.senderId.substr(0, 8);

            messageDiv.innerHTML = `
                <div class="message-sender">${senderDisplay}</div>
                <div class="message-content">
                    ${escapeHtml(message.content)}
                </div>
                <div class="message-time">${time}</div>
            `;

            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function displayVoiceMessage(message, isOwn) {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isOwn ? 'own' : 'other'}`;

            const time = new Date(message.createdAt).toLocaleTimeString();
            const senderDisplay = isOwn ? 'You' : message.senderId.substr(0, 8);

            messageDiv.innerHTML = `
                <div class="message-sender">${senderDisplay}</div>
                <div class="voice-message">
                    <audio controls style="max-width: 200px;">
                        <source src="${message.audioUrl}" type="audio/mp3">
                    </audio>
                    <small>${message.duration}s</small>
                </div>
                <div class="message-time">${time}</div>
            `;

            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function addSystemMessage(text) {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'system-message';
            messageDiv.textContent = text;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function updateTypingStatus() {
            const typingDiv = document.getElementById('typing');
            if (typingUsers.size > 0) {
                const users = Array.from(typingUsers).join(', ');
                typingDiv.textContent = `${users} is typing...`;
            } else {
                typingDiv.textContent = '';
            }
        }

        function updateMembersList() {
            socket.emit('room:info', { conversationId });
        }

        socket.on('room:info:response', (data) => {
            const { members, memberCount } = data;
            roomMembers = members;
            
            document.getElementById('memberCount').textContent = memberCount;
            document.getElementById('roomInfo').textContent = `${memberCount} members online`;

            const membersList = document.getElementById('membersList');
            membersList.innerHTML = '';

            members.forEach(member => {
                const isCurrentUser = member === userId;
                const memberDiv = document.createElement('div');
                memberDiv.className = `member-item ${isCurrentUser ? 'active' : ''}`;
                memberDiv.innerHTML = `
                    <div class="member-status"></div>
                    <div class="member-name">${isCurrentUser ? 'You' : member.substr(0, 8)}</div>
                `;
                membersList.appendChild(memberDiv);
            });
        });

        function escapeHtml(unsafe) {
            return unsafe
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // ===== VOICE RECORDING =====
        async function toggleVoiceRecording() {
            if (!isRecording) {
                startVoiceRecording();
            } else {
                stopVoiceRecording();
            }
        }

        async function startVoiceRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = (event) => {
                    audioChunks.push(event.data);
                };

                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/mp3' });
                    const audioUrl = URL.createObjectURL(audioBlob);
                    
                    socket.emit('message:voice:send', {
                        senderId: userId,
                        audioUrl: audioUrl,
                        duration: Math.round(audioChunks.length / 10) || 5,
                        conversationId: conversationId
                    });
                };

                mediaRecorder.start();
                isRecording = true;
                document.getElementById('voiceBtn').classList.add('recording');
                document.getElementById('voiceBtn').textContent = '⏹️';
            } catch (error) {
                console.error('Microphone error:', error);
                alert('Cannot access microphone');
            }
        }

        function stopVoiceRecording() {
            mediaRecorder.stop();
            isRecording = false;
            document.getElementById('voiceBtn').classList.remove('recording');
            document.getElementById('voiceBtn').textContent = '🎤';
        }

        // ===== INPUT EVENTS =====
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        document.getElementById('messageInput').addEventListener('input', () => {
            socket.emit('user:typing', { userId, conversationId });
        });

        document.getElementById('messageInput').addEventListener('blur', () => {
            socket.emit('user:stop-typing', { userId, conversationId });
        });

        // Load members on start
        setTimeout(() => {
            updateMembersList();
        }, 500);

        // ===== VIDEO CALL FUNCTIONALITY =====
        let ongoingCall = false;

        function startVideoCall() {
            if (roomMembers.length < 2) {
                alert('⚠️ Need at least 2 members to make a video call');
                return;
            }

            // Get another user (not current user)
            const otherUsers = roomMembers.filter(member => member !== userId);
            
            if (otherUsers.length === 0) {
                alert('⚠️ No other user available');
                return;
            }

            const otherUser = otherUsers[0];
            console.log('📞 Starting video call with:', otherUser);
            
            const videoCallBtn = document.getElementById('videoCallBtn');
            videoCallBtn.disabled = true;
            videoCallBtn.classList.add('calling');
            
            // Open new tab for video call
            const videoCallWindow = window.open(
                `call.html?caller=${userId}&callee=${otherUser}`,
                'videocall',
                'width=1200,height=700'
            );

            if (!videoCallWindow) {
                alert('⚠️ Pop-up blocked. Please allow pop-ups and try again.');
                videoCallBtn.disabled = false;
                videoCallBtn.classList.remove('calling');
            } else {
                ongoingCall = true;
                addSystemMessage(`📞 Started video call with ${otherUser.substr(0, 8)}`);
                // Notify server to inform the callee
                const callId = 'call-' + Date.now();
                socket.emit('call:initiate', {
                    callId,
                    initiatorId: userId,
                    receiverId: otherUser,
                    conversationId
                });
                
                // Reset button after 30 seconds
                setTimeout(() => {
                    videoCallBtn.disabled = false;
                    videoCallBtn.classList.remove('calling');
                }, 30000);
            }
        }

        // Listen for video call events
        socket.on('videocall:started', (data) => {
            addSystemMessage(`📞 ${data.userId} started a video call`);
        });

        // Incoming call (callee)
        socket.on('call:incoming', (data) => {
            const { callId, initiatorId, conversationId } = data;
            console.log('📥 Incoming call from', initiatorId, data);

            // Prompt user to accept/reject.
            const accept = confirm(`Incoming call from ${initiatorId.substr(0,8)}. Accept?`);

            if (accept) {
                // Notify server and open call page as callee
                socket.emit('call:accept', { callId, initiatorId, receiverId: userId });

                // Open call page (callee)
                const win = window.open(
                    `call.html?caller=${initiatorId}&callee=${userId}`,
                    'videocall',
                    'width=1200,height=700'
                );
                if (!win) {
                    alert('⚠️ Pop-up blocked. Please allow pop-ups and try again.');
                }
            } else {
                socket.emit('call:reject', { callId, initiatorId, receiverId: userId });
                addSystemMessage('📞 You rejected a call');
            }
        });

        // Call accepted (initiator)
        socket.on('call:accepted', (data) => {
            const { callId, receiverId } = data;
            console.log('✅ Call accepted by', receiverId, data);
            addSystemMessage(`📞 ${receiverId.substr(0,8)} accepted the call`);
        });

        // Call rejected (initiator)
        socket.on('call:rejected', (data) => {
            const { callId, receiverId } = data;
            console.log('❌ Call rejected by', receiverId, data);
            addSystemMessage(`📞 ${receiverId.substr(0,8)} rejected the call`);
            const videoCallBtn = document.getElementById('videoCallBtn');
            videoCallBtn.classList.remove('calling');
            videoCallBtn.disabled = false;
            ongoingCall = false;
        });

        // Call ended
        socket.on('call:ended', (data) => {
            addSystemMessage('📞 Call ended');
            const videoCallBtn = document.getElementById('videoCallBtn');
            videoCallBtn.classList.remove('calling');
            videoCallBtn.disabled = false;
            ongoingCall = false;
        });

        socket.on('videocall:ended', (data) => {
            const videoCallBtn = document.getElementById('videoCallBtn');
            videoCallBtn.classList.remove('calling');
            videoCallBtn.disabled = false;
            ongoingCall = false;
            addSystemMessage(`📞 Video call ended`);
        });
    </script>
</body>
</html>
