name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      # Clone repo
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      # Install dependencies
      - name: Install dependencies
        run: npm install

      # Run lint (nếu có)
      - name: Run lint
        run: npm run lint --if-present

      # Run tests (nếu có)
      - name: Run tests
        run: npm test --if-present

      # Optional build check
      - name: Build project
        run: npm run build --if-present
